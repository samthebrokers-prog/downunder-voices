export function LegalPage({ eyebrow, title, updated = 'July 2026', children }: { eyebrow: string; title: string; updated?: string; children: React.ReactNode }) { return <article className="mx-auto max-w-3xl px-4 py-12"><header className="border-b-2 border-primary pb-4"><p className="text-xs font-semibold uppercase tracking-[0.2em] text-primary">{eyebrow}</p><h1 className="mt-1 font-serif text-4xl font-bold">{title}</h1><p className="mt-2 text-sm text-muted-foreground">Last updated: {updated}</p></header><div className="prose-content mt-8 space-y-6 leading-7 text-foreground/90">{children}</div></article> }
